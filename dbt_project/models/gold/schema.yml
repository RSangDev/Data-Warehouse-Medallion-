version: 2

models:
  - name: gld_saude_por_uf
    description: >
      Visao analitica principal: indicadores de saude e socioeconomicos
      por UF e ano. Inclui rankings nacionais e score de performance.
    columns:
      - name: sigla_uf
        data_tests: [not_null]
      - name: ano
        data_tests: [not_null]
      - name: taxa_obito_pct
        data_tests:
          - not_null
          - accepted_range:
              min_value: 0
              max_value: 100
      - name: score_performance
        data_tests:
          - not_null
          - accepted_range:
              min_value: 0
      - name: pct_urgencia
        data_tests:
          - accepted_range:
              min_value: 0
              max_value: 100

  - name: gld_diagnosticos_resumo
    description: >
      Ranking de CIDs por volume, custo e mortalidade por ano.
    columns:
      - name: cid_principal
        data_tests: [not_null]
      - name: ano
        data_tests: [not_null]
      - name: taxa_obito_pct
        data_tests:
          - accepted_range:
              min_value: 0
              max_value: 100
      - name: rank_volume
        data_tests:
          - not_null
          - accepted_range:
              min_value: 1

  - name: gld_evolucao_temporal
    description: >
      Serie temporal mensal com medias moveis e variacao MoM por regiao.
    columns:
      - name: mes
        data_tests:
          - not_null
          - accepted_range:
              min_value: 1
              max_value: 12
      - name: trimestre
        data_tests:
          - accepted_values:
              values: ["Q1", "Q2", "Q3", "Q4"]